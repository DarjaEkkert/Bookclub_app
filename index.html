<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bookclub App</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
 
  <h1>Bookclub</h1>
  <p class="subtitle">We need more books</p>

  <h2>📚 My Book List</h2>

  <div class="form">
    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input type="file" id="coverFile" accept="image/*">
    <textarea id="review" placeholder="Your personal review"></textarea>

    <select id="rating">
      <option value="0">0</option>
      <option value="1">1 ⭐</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐</option>
      <option value="4">4 ⭐</option>
      <option value="5">5 ⭐</option>
    </select>

    <button onclick="addBook()">Add Book</button>
  </div>

  <div id="list"></div>
</div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

function save() {
  localStorage.setItem("books", JSON.stringify(books));
}

function addBook() {
  const fileInput = document.getElementById("coverFile");
  const file = fileInput.files[0];

  const title = document.getElementById("title").value;
  const author = document.getElementById("author").value;
  const review = document.getElementById("review").value;
  const rating = document.getElementById("rating").value;

  if (!title || !author) return;

  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      saveBook(title, author, review, rating, e.target.result);
    };
    reader.readAsDataURL(file);
  } else {
    saveBook(title, author, review, rating, "");
  }

  document.getElementById("title").value = "";
  document.getElementById("author").value = "";
  document.getElementById("review").value = "";
  document.getElementById("coverFile").value = "";
}

function saveBook(title, author, review, rating, coverData) {
  const book = {
    id: Date.now(),
    title: title,
    author: author,
    cover: coverData,
    review: review,
    rating: rating
  };

  books.push(book);
  save();
  render();
}
function deleteBook(id) {
  books = books.filter(b => b.id !== id);
  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";

    div.innerHTML = `
      ${b.cover ? `<img src="${b.cover}" />` : ""}

      <div class="book-content">
        <div class="book-title">${b.title}</div>
        <div class="book-author">by ${b.author}</div>

        <div class="rating">⭐ ${b.rating}</div>

        <div class="review">${b.review || ""}</div>

        <div class="actions">
          <button onclick="deleteBook(${b.id})">🗑️</button>
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

render();

</script>
</body>
</html>
