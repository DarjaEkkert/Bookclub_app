<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bookclub App</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">
 
  <h1>Bookclub</h1>
  <p class="subtitle">We need more books</p>

  <h2>📚 My Book List</h2>

  <div class="form">
    <input id="title" placeholder="Title">
    <input id="author" placeholder="Author">
    <input id="cover" placeholder="Cover URL (optional)">
    <textarea id="review" placeholder="Your personal review"></textarea>

    <select id="rating">
      <option value="0">0</option>
      <option value="1">1 ⭐</option>
      <option value="2">2 ⭐</option>
      <option value="3">3 ⭐</option>
      <option value="4">4 ⭐</option>
      <option value="5">5 ⭐</option>
    </select>

    <button onclick="addBook()">Add Book</button>
  </div>

  <div id="list"></div>
</div>

<script>
let books = JSON.parse(localStorage.getItem("books")) || [];

function save() {
  localStorage.setItem("books", JSON.stringify(books));
}

function addBook() {
  const book = {
    id: Date.now(),
    title: document.getElementById("title").value,
    author: document.getElementById("author").value,
    cover: document.getElementById("cover").value,
    review: document.getElementById("review").value,
    rating: document.getElementById("rating").value
  };

  if (!book.title || !book.author) return;

  books.push(book);
  save();
  render();

  document.getElementById("title").value = "";
  document.getElementById("author").value = "";
  document.getElementById("cover").value = "";
  document.getElementById("review").value = "";
}

function deleteBook(id) {
  books = books.filter(b => b.id !== id);
  save();
  render();
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  books.forEach(b => {
    const div = document.createElement("div");
    div.className = "book";

    div.innerHTML = `
      ${b.cover ? `<img src="${b.cover}">` : ""}
      <div class="book-content">
        <div class="book-title">${b.title}</div>
        <div class="book-author">by ${b.author}</div>
        <div class="rating">⭐ ${b.rating}</div>
        <div class="review">${b.review}</div>
        <div class="actions">
          <button onclick="deleteBook(${b.id})">🗑️</button>
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

render();

</script>
</body>
</html>
